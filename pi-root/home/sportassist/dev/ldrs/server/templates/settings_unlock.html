{% extends "base.html" %} {% block title %}Settings access — Sport Assist{%
endblock %} {% block content %}
<div class="card" style="max-width: 420px; margin: 4rem auto">
  <h1>Settings access</h1>
  <p class="hint">
    You are logged in. Enter the settings password to open configuration pages.
  </p>
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post">
    <input type="hidden" name="next" value="{{ next_path }}" />
    <label for="password">Settings password</label>
    <input
      type="password"
      id="password"
      name="password"
      autocomplete="current-password"
      autofocus
      required
    />
    <button type="submit" class="btn">Continue</button>
  </form>
  <p class="hint" style="margin-top: 1rem">
    <a href="{{ url_for('replay_page') }}" style="color: #86efac"
      >← Back to replay</a
    >
  </p>
</div>
{% endblock %}
