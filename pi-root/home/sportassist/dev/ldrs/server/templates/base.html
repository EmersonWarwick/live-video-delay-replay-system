<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Sport Assist{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 1.5rem;
        background: radial-gradient(
          circle at top left,
          #1e293b 0,
          #020617 55%,
          #000 100%
        );
        color: #e5e7eb;
        min-height: 100vh;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
      }
      .card {
        background: #020617;
        border-radius: 0.9rem;
        padding: 1.6rem;
        border: 1px solid rgba(148, 163, 184, 0.3);
        box-shadow: 0 22px 55px rgba(0, 0, 0, 0.85);
        margin-bottom: 1.2rem;
      }
      h1 {
        font-size: 1.35rem;
        margin: 0 0 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      h2 {
        font-size: 1rem;
        margin: 0 0 0.8rem;
        color: #94a3b8;
      }
      label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 0.25rem;
      }
      input,
      select {
        width: 100%;
        padding: 0.55rem 0.7rem;
        border-radius: 0.5rem;
        border: 1px solid rgba(148, 163, 184, 0.6);
        background: #0f172a;
        color: #e5e7eb;
        box-sizing: border-box;
        margin-bottom: 0.6rem;
      }
      .radio-row {
        display: flex;
        gap: 1.2rem;
        margin: 0.4rem 0 0.8rem;
      }
      .btn {
        appearance: none;
        border: none;
        border-radius: 999px;
        padding: 0.65rem 1.2rem;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(to right, #22c55e, #16a34a);
        color: #ecfdf5;
      }
      .btn-secondary {
        background: #334155;
        color: #e2e8f0;
      }
      .btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }
      .error {
        color: #f87171;
        font-size: 0.9rem;
        margin-bottom: 0.8rem;
      }
      .hint {
        font-size: 0.78rem;
        color: #9ca3af;
        margin-top: -0.3rem;
        margin-bottom: 0.6rem;
      }
      .status-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        font-size: 0.85rem;
      }
      .msg {
        padding: 0.5rem;
        background: #14532d;
        border-radius: 0.4rem;
        font-size: 0.85rem;
        display: none;
      }
      .msg.show {
        display: block;
      }
      .hdmi-toggle-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        margin: 0.8rem 0 0.4rem;
        flex-wrap: wrap;
      }
      .hdmi-label {
        font-size: 0.85rem;
        color: #64748b;
        transition: color 0.2s;
      }
      .hdmi-label.active {
        color: #e5e7eb;
        font-weight: 600;
      }
      .preset-recall.active {
        background: #16a34a;
        color: #ecfdf5;
      }
      .lens-row {
        margin-bottom: 0.9rem;
      }
      .lens-row label {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 0.35rem;
      }
      .lens-value {
        font-variant-numeric: tabular-nums;
        color: #94a3b8;
        font-size: 0.8rem;
      }
      .lens-limits {
        font-size: 0.72rem;
        color: #64748b;
        margin: 0.35rem 0 0;
      }
      .lens-slider-row {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 0.6rem;
      }
      .lens-slider-row input[type="range"].lens-slider {
        flex: 1 1 0;
        min-width: 0;
        width: auto;
        max-width: none;
        margin-bottom: 0;
      }
      .lens-send {
        flex: 0 0 auto;
        align-self: center;
        padding: 0.55rem 0.9rem;
        margin: 0;
        white-space: nowrap;
      }
      input[type="range"].lens-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        margin: 0;
        padding: 0.85rem 0;
        min-height: 2.75rem;
        background: transparent;
        touch-action: pan-x;
        cursor: grab;
        box-sizing: border-box;
      }
      input[type="range"].lens-slider:active {
        cursor: grabbing;
      }
      input[type="range"].lens-slider:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      input[type="range"].lens-slider::-webkit-slider-runnable-track {
        height: 0.5rem;
        background: #334155;
        border-radius: 999px;
      }
      input[type="range"].lens-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 1.85rem;
        height: 1.85rem;
        margin-top: -0.68rem;
        border-radius: 50%;
        background: #22c55e;
        border: 2px solid #ecfdf5;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      }
      input[type="range"].lens-slider::-moz-range-track {
        height: 0.5rem;
        background: #334155;
        border-radius: 999px;
      }
      input[type="range"].lens-slider::-moz-range-thumb {
        width: 1.85rem;
        height: 1.85rem;
        border-radius: 50%;
        background: #22c55e;
        border: 2px solid #ecfdf5;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 3.4rem;
        height: 1.85rem;
        flex-shrink: 0;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
        margin: 0;
      }
      .switch .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #334155;
        border-radius: 999px;
        transition: 0.2s;
      }
      .switch .slider:before {
        position: absolute;
        content: "";
        height: 1.4rem;
        width: 1.4rem;
        left: 0.22rem;
        bottom: 0.22rem;
        background: #e5e7eb;
        border-radius: 50%;
        transition: 0.2s;
      }
      .switch input:checked + .slider {
        background: #16a34a;
      }
      .switch input:checked + .slider:before {
        transform: translateX(1.55rem);
      }
      .cam-results {
        margin: 0.6rem 0 0.8rem;
        padding: 0.5rem;
        background: #0f172a;
        border-radius: 0.5rem;
        border: 1px solid #334155;
      }
      .cam-results label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.4rem;
        cursor: pointer;
      }
      .cam-results input {
        width: auto;
        margin: 0;
      }
      .modal-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.82);
        z-index: 100;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .modal-backdrop.show {
        display: flex;
      }
      .modal {
        width: 100%;
        max-width: 420px;
        background: #020617;
        border: 1px solid #334155;
        border-radius: 0.9rem;
        padding: 1.2rem;
        box-shadow: 0 22px 55px rgba(0, 0, 0, 0.85);
      }
      .modal h2 {
        margin: 0 0 0.5rem;
        font-size: 1rem;
        color: #e5e7eb;
      }
      .modal-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.8rem;
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="wrap">{% block content %}{% endblock %}</div>
    {% block scripts %}{% endblock %}
  </body>
</html>
