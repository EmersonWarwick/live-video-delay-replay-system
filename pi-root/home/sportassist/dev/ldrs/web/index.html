<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sport Assist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #020617;
        color: #e5e7eb;
      }
      .box {
        text-align: center;
        padding: 2rem;
        max-width: 28rem;
      }
      h1 {
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      p {
        line-height: 1.5;
        color: #cbd5e1;
      }
      a {
        display: inline-block;
        margin: 0.5rem;
        padding: 0.9rem 1.4rem;
        border-radius: 999px;
        background: #16a34a;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
      a.secondary {
        background: #334155;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Sport Assist</h1>
      <p>
        Connect to this unit’s Wi‑Fi, then open the <strong>Android</strong> or
        <strong>iOS</strong> app for 20‑minute scrub replay.
      </p>
      <p>
        Coach poolside video: <strong>4K HDMI</strong> monitor. Toggle delayed
        or live HDMI in Settings.
      </p>
      <p><a href="/settings/login">Settings</a></p>
      <p><a href="/api/status" class="secondary">Status (diagnostics)</a></p>
    </div>
  </body>
</html>
