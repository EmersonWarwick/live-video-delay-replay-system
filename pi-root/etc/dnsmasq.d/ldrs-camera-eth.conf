# Ethernet DHCP for camera (direct mode only) — spec-network-dhcp.md
# Enabled by ldrs-network.sh when ETH_CAMERA_DHCP=1
# Gateway/DNS for camera subnet — separate from Wi‑Fi AP (192.168.4.1).

interface=eth0
bind-interfaces
dhcp-range=192.168.10.100,192.168.10.150,255.255.255.0,24h
dhcp-option=3,192.168.10.1
dhcp-option=6,192.168.10.1
domain-needed
bogus-priv
